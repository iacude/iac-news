name: Update publications data

on:
  workflow_dispatch:
  schedule:
    # Runs daily at 05:17 UTC. Adjust as needed; GitHub cron uses UTC.
    - cron: "17 5 * * *"

permissions:
  contents: write

jobs:
  update-publications:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Fetch publication metadata
        run: >-
          python fetch_publications.py
          --orcid-file orcids.txt
          --out docs/data/publications.json
          --with-details
          --detail-count 80
          --with-crossref
          --with-pubmed
          --with-s2
          --years-back 2
          --years-forward 1
          --max-items 80

      - name: Commit updated JSON if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/publications.json
          if git diff --cached --quiet; then
            echo "No publication changes to commit."
          else
            git commit -m "Update publications data"
            git push
          fi
